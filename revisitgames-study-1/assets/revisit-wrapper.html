<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Unity Game Embedded in reVISit</title>
  <script src="../../revisitUtilities/revisit-communicate.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    iframe {
      border: none;
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

<body>
  <iframe id="unity-iframe" allow="fullscreen"></iframe>

  <script>
    const iframe = document.getElementById("unity-iframe");
  function getLevelTagOnly() {
    // 1) prefer hash: ...revisit-wrapper.html#levelTag=1
    const hashParams = new URLSearchParams(location.hash.slice(1));
    let v = hashParams.get("levelTag");

    // 2) fallback to query: ...?levelTag=1&trialid=...
    if (v == null) {
      // normalize broken strings like "?levelTag=1?trialid=Game_1"
      const normalized = location.search.replace(/\?(?=.*\?)/g, "&");
      const qs = new URLSearchParams(normalized);
      v = qs.get("levelTag");
      // defense: if somebody appended after the value with "?", strip it
      if (v && v.includes("?")) v = v.split("?")[0];
    }

    // keep only an integer
    const n = v != null ? parseInt(v, 10) : NaN;
    return Number.isFinite(n) ? String(n) : null;
  }

  const levelTag = getLevelTagOnly();

  let unityUrl = "Build/index.html";
  if (levelTag !== null) {
    unityUrl += "?levelTag=" + encodeURIComponent(levelTag);
  }
  iframe.src = unityUrl;

    window.addEventListener("message", (event) => {
        console.log("[Wrapper] Unity sent:", event.data.payload);
      //Handle message back from Unity
      if (event.data?.type === "game_event") {

        Revisit.postAnswers({
          log: JSON.stringify(event.data.payload)
        });
      }
       if (event.data?.type === "level_complete") {
        console.log("level complete");

        Revisit.postAnswers({
          level_complete: JSON.stringify(event.data.payload)
        });
      }
    }); 

  </script>
  
</body>

</html>
